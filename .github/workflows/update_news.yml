YAML
name: Daily News Dashboard Updater

on:
  schedule:
    - cron: '0 22 * * *' # 每天台灣時間早上 06:00 執行
  workflow_dispatch: # 允許手動點擊按鈕更新

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 檢出程式碼庫
      uses: actions/checkout@v4
    - name: 設定 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 安裝套件
      run: pip install requests
    - name: 執行抓取
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python fetch_news.py
    - name: 儲存數據
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 系統自動化：更新今日精選新聞"
        file_pattern: 'news_data.json'
